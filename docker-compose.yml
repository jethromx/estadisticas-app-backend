version: '3.9'

services:
  postgres:
    image: postgres:17-alpine
    container_name: lottery_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-lottery_db}
      POSTGRES_USER: ${DB_USER:-lottery_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lottery_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lottery_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lottery_user} -d ${DB_NAME:-lottery_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lottery_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@lottery.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lottery_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  lottery_net:
    driver: bridge
