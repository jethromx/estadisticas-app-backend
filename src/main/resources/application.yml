spring:
  application:
    name: lottery-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lottery_db}
    username: ${DB_USER:lottery_user}
    password: ${DB_PASSWORD:lottery_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
    min-response-size: 2048
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

lottery:
  download:
    timeout-seconds: 30
    max-retries: 3
    user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
    charset: "UTF-8"
  urls:
    melate: "https://www.loterianacional.gob.mx/Home/Historicos?ARHP=TQBlAGwAYQB0AGUA"
    revancha: "https://www.loterianacional.gob.mx/Home/Historicos?ARHP=UgBlAHYAYQBuAGMAaABhAA=="
    revanchita: "https://www.loterianacional.gob.mx/Home/Historicos?ARHP=UgBlAHYAYQBuAGMAaABpAHQAYQA="
  sync:
    cron: "0 0 3 * * WED,SAT"
    stale-threshold-days: 3

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  allowed-origins: ${ALLOWED_ORIGINS:*}
  jwt:
    secret: ${JWT_SECRET:lottery-api-default-secret-key-change-in-production-min-32-chars}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}

logging:
  level:
    com.lottery: INFO
    org.flywaydb: INFO
